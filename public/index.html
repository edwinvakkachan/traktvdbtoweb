<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trakt Review Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --sub: #64748b;
      --input: #f8fafc;
      --input-border: #cbd5e1;
      --row-hover: #f8fafc;
    }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --sub: #94a3b8;
      --input: #273549;
      --input-border: #334155;
      --row-hover: #273549;
    }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* HEADER */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: background 0.3s, border-color 0.3s;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: #6366f1;
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

    .theme-btn {
      background: var(--input);
      border: 1px solid var(--input-border);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 18px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .theme-btn:hover { opacity: 0.8; }

    /* MAIN */
    .main { max-width: 1140px; margin: 0 auto; padding: 32px 24px 60px; }

    /* STAT CARDS */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: background 0.3s, border-color 0.3s;
    }
    .stat-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; flex-shrink: 0;
    }
    .stat-icon.pending   { background: #eef2ff; color: #6366f1; }
    .stat-icon.completed { background: #f0fdf4; color: #22c55e; }
    .stat-icon.ignored   { background: #fef2f2; color: #ef4444; }
    body.dark .stat-icon.pending   { background: #312e81; }
    body.dark .stat-icon.completed { background: #14532d; }
    body.dark .stat-icon.ignored   { background: #7f1d1d; }
    .stat-info { flex: 1; }
    .stat-label { font-size: 15px; font-weight: 600; color: var(--sub); }
    .stat-sub   { font-size: 12px; color: var(--sub); opacity: 0.7; margin-top: 2px; }
    .stat-count { font-size: 36px; font-weight: 700; color: var(--text); }

    /* TABLE CARD */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    /* TOOLBAR */
    .toolbar {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .btn-bulk {
      background: #6366f1; color: #fff;
      border: none; border-radius: 10px;
      padding: 10px 22px; font-size: 14px;
      font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-bulk:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-bulk:not(:disabled):hover { opacity: 0.87; transform: translateY(-1px); }

    .search-wrap { position: relative; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; color: var(--sub); pointer-events: none;
    }
    .search-input {
      background: var(--input);
      border: 1px solid var(--input-border);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 16px 9px 36px;
      font-size: 14px; font-family: inherit;
      width: 230px; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #6366f1; }

    /* TABLE */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid var(--border); }
    th {
      padding: 13px 16px; text-align: left;
      font-size: 11px; font-weight: 700;
      color: var(--sub); letter-spacing: 0.06em;
      text-transform: uppercase; white-space: nowrap;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: var(--text); }
    th:last-child { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    td { padding: 14px 16px; font-size: 14px; color: var(--text); vertical-align: middle; }
    td:last-child { text-align: right; }

    .item-cell { display: flex; align-items: center; gap: 12px; }
    .item-icon {
      width: 36px; height: 36px;
      background: #eef2ff; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #6366f1; font-size: 16px; flex-shrink: 0;
    }
    body.dark .item-icon { background: #312e81; }
    .item-title { font-weight: 600; font-size: 14px; }
    .item-year-sub { font-size: 12px; color: var(--sub); margin-top: 2px; }

    .badge {
      border-radius: 7px; padding: 4px 12px;
      font-size: 12px; font-weight: 700;
      text-transform: capitalize; color: #fff;
    }
    .badge.show  { background: #22c55e; }
    .badge.movie { background: #6366f1; }

    .actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-action {
      border: none; cursor: pointer;
      border-radius: 8px; padding: 7px 14px;
      font-size: 13px; font-weight: 600;
      font-family: inherit;
      transition: opacity 0.15s, transform 0.1s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-action:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-action:active { transform: translateY(0); }
    .btn-complete { background: #22c55e; color: #fff; }
    .btn-ignore   { background: #ef4444; color: #fff; }

    .empty-row td { padding: 48px; text-align: center; color: var(--sub); font-size: 15px; }

    /* PAGINATION */
    .pagination {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-info { color: var(--sub); font-size: 13px; display: flex; align-items: center; gap: 12px; }
    .page-info strong { color: var(--text); }
    .page-nums { display: flex; gap: 5px; }
    .page-num {
      width: 32px; height: 32px;
      border-radius: 8px; border: 1px solid var(--input-border);
      background: transparent; color: var(--text);
      cursor: pointer; font-family: inherit;
      font-weight: 600; font-size: 13px; transition: all 0.15s;
    }
    .page-num.active { background: #6366f1; border-color: #6366f1; color: #fff; }
    .page-num:not(.active):hover { border-color: #6366f1; color: #6366f1; }
    .btn-nav {
      background: transparent; border: 1px solid var(--input-border);
      color: var(--text); border-radius: 8px;
      padding: 8px 18px; cursor: pointer;
      font-family: inherit; font-weight: 600; font-size: 14px;
      transition: all 0.15s;
    }
    .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-nav:not(:disabled):hover { border-color: #6366f1; color: #6366f1; }

    input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: #6366f1; }

    @media (max-width: 700px) {
      .stats { grid-template-columns: 1fr; }
      .header { padding: 14px 16px; }
      .main { padding: 20px 12px 40px; }
      .header h1 { font-size: 17px; }
      .toolbar { flex-direction: column; align-items: stretch; gap: 12px; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="logo-icon">🎬</div>
      <h1>Trakt Review Dashboard</h1>
    </div>
    <button class="theme-btn" id="themeBtn">🌙 Dark Mode</button>
  </header>

  <main class="main">

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon pending">⠿</div>
        <div class="stat-info"><div class="stat-label">Pending</div><div class="stat-sub">Pending</div></div>
        <div class="stat-count" id="countPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon completed">✓</div>
        <div class="stat-info"><div class="stat-label">Completed</div><div class="stat-sub">Completed</div></div>
        <div class="stat-count" id="countCompleted">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon ignored">✕</div>
        <div class="stat-info"><div class="stat-label">Ignored</div><div class="stat-sub">Ignored</div></div>
        <div class="stat-count" id="countIgnored">0</div>
      </div>
    </div>

    <div class="table-card">
      <div class="toolbar">
        <button class="btn-bulk" id="btnBulk" disabled>✓ Bulk Complete</button>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="search" id="searchInput" placeholder="Search..." />
        </div>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:44px"><input type="checkbox" id="checkAll" /></th>
              <th>Title</th>
              <th class="sortable" data-field="year">YEAR <span class="sort-icon" data-field="year">↕</span></th>
              <th>TYPE</th>
              <th class="sortable" data-field="created_at">CREATED <span class="sort-icon" data-field="created_at">↕</span></th>
              <th>ACTIONS</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="btn-nav" id="btnPrev" disabled>← Prev</button>
        <div class="page-info">
          <span>Page <strong id="pageNum">1</strong> of <strong id="totalPagesL">1</strong></span>
          <div class="page-nums" id="pageNums"></div>
          <span>Page <strong id="pageNum2">1</strong> of <strong id="totalPagesR">1</strong> →</span>
        </div>
        <button class="btn-nav" id="btnNext">Next →</button>
      </div>
    </div>

  </main>

<script>
  /* ── DATA ── */
 
let items = [];

async function loadItems() {
  try {
    const res = await fetch("/api/all");
    const data = await res.json();
    items = data.items;   // IMPORTANT
    render();
  } catch (err) {
    console.error("Failed to load items:", err);
  }
}

loadItems();

  const PER_PAGE = 5;
  let page = 1, sortField = "created_at", sortDir = "desc", search = "";
  let selected = new Set();

  /* ── THEME ── */
  let dark = false;
  document.getElementById("themeBtn").addEventListener("click", () => {
    dark = !dark;
    document.body.classList.toggle("dark", dark);
    document.getElementById("themeBtn").textContent = dark ? "☀ Light Mode" : "🌙 Dark Mode";
  });

  /* ── HELPERS ── */
  function fmt(iso) {
    return new Date(iso).toLocaleString("en-GB", {
      day:"2-digit", month:"2-digit", year:"numeric",
      hour:"2-digit", minute:"2-digit", second:"2-digit"
    });
  }

  function getFiltered() {
    let arr = items.filter(i =>
      i.status === "pending" &&
      i.title.toLowerCase().includes(search.toLowerCase())
    );
    arr.sort((a, b) => {
      let va = a[sortField], vb = b[sortField];
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      return sortDir === "asc" ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
    return arr;
  }

  function updateCounts() {
    document.getElementById("countPending").textContent   = items.filter(i => i.status === "pending").length;
    document.getElementById("countCompleted").textContent = items.filter(i => i.status === "completed").length;
    document.getElementById("countIgnored").textContent   = items.filter(i => i.status === "ignored").length;
  }

async function markStatus(ids, status) {
  for (const id of ids) {
    const endpoint = status === "completed"
      ? `/api/complete/${id}`
      : `/api/ignore/${id}`;

    const res = await fetch(endpoint, { method: "PATCH" });

    console.log("PATCH:", endpoint, res.status);

    if (!res.ok) {
      const text = await res.text();
      console.error("Server error:", text);
      return;
    }
  }

  await loadItems();
  selected.clear();
}


/* ── RENDER ── */
  function render() {
    updateCounts();
    const filtered  = getFiltered();
    const totalP    = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
    const paginated = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

    // Table body
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = paginated.length === 0
      ? `<tr class="empty-row"><td colspan="6">No pending items found.</td></tr>`
      : paginated.map(item => `
          <tr>
            <td><input type="checkbox" class="row-check" data-id="${item.id}" ${selected.has(item.id) ? "checked" : ""} /></td>
            <td>
              <div class="item-cell">
                <div class="item-icon">⠿</div>
                <div>
                  <div class="item-title">${item.title}</div>
                  <div class="item-year-sub">${item.year}</div>
                </div>
              </div>
            </td>
            <td style="color:var(--sub)">${item.year}</td>
            <td><span class="badge ${item.type}">${item.type}</span></td>
            <td style="color:var(--sub);font-size:13px">${fmt(item.created_at)}</td>
            <td>
              <div class="actions">
                <button class="btn-action btn-complete" data-id="${item.id}" data-action="completed">✓ Complete</button>
                <button class="btn-action btn-ignore"   data-id="${item.id}" data-action="ignored">✕ Ignore</button>
              </div>
            </td>
          </tr>`).join("");

    // Check-all
    const checkAll = document.getElementById("checkAll");
    const allIds = paginated.map(i => i.id);
    checkAll.checked       = allIds.length > 0 && allIds.every(id => selected.has(id));
    checkAll.indeterminate = !checkAll.checked && allIds.some(id => selected.has(id));

    // Bulk button
    document.getElementById("btnBulk").disabled = selected.size === 0;

    // Sort icons
    document.querySelectorAll(".sort-icon").forEach(el => {
      const f = el.dataset.field;
      el.textContent = sortField === f ? (sortDir === "asc" ? "↑" : "↓") : "↕";
      el.style.opacity = sortField === f ? "1" : "0.35";
    });

    // Pagination
    document.getElementById("pageNum").textContent    = page;
    document.getElementById("pageNum2").textContent   = page;
    document.getElementById("totalPagesL").textContent = totalP;
    document.getElementById("totalPagesR").textContent = totalP;
    document.getElementById("btnPrev").disabled = page === 1;
    document.getElementById("btnNext").disabled = page === totalP;

    const pageNums = document.getElementById("pageNums");
    pageNums.innerHTML = Array.from({ length: totalP }, (_, i) =>
      `<button class="page-num ${i + 1 === page ? "active" : ""}" data-p="${i + 1}">${i + 1}</button>`
    ).join("");

    // Row checkbox events
    tbody.querySelectorAll(".row-check").forEach(cb => {
      cb.addEventListener("change", () => {
        const id = +cb.dataset.id;
        cb.checked ? selected.add(id) : selected.delete(id);
        render();
      });
    });

    // Action buttons
    tbody.querySelectorAll(".btn-action").forEach(btn => {
      btn.addEventListener("click", () => markStatus([+btn.dataset.id], btn.dataset.action));
    });

    // Page number buttons
    pageNums.querySelectorAll(".page-num").forEach(btn => {
      btn.addEventListener("click", () => { page = +btn.dataset.p; render(); });
    });
  }

  /* ── STATIC EVENTS ── */
  document.getElementById("checkAll").addEventListener("change", e => {
    const paginated = getFiltered().slice((page - 1) * PER_PAGE, page * PER_PAGE);
    if (e.target.checked) paginated.forEach(i => selected.add(i.id));
    else paginated.forEach(i => selected.delete(i.id));
    render();
  });

  document.getElementById("btnBulk").addEventListener("click", () => markStatus([...selected], "completed"));

  document.getElementById("searchInput").addEventListener("input", e => {
    search = e.target.value; page = 1; selected.clear(); render();
  });

  document.getElementById("btnPrev").addEventListener("click", () => { if (page > 1) { page--; render(); } });
  document.getElementById("btnNext").addEventListener("click", () => {
    const total = Math.max(1, Math.ceil(getFiltered().length / PER_PAGE));
    if (page < total) { page++; render(); }
  });

  document.querySelectorAll(".sortable").forEach(th => {
    th.addEventListener("click", () => {
      const f = th.dataset.field;
      if (sortField === f) sortDir = sortDir === "asc" ? "desc" : "asc";
      else { sortField = f; sortDir = "asc"; }
      page = 1; render();
    });
  });

  render();
</script>
</body>
</html>
