<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trakt Review Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-950">

<div class="max-w-7xl mx-auto p-6">

<!-- ===== STATS ===== -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="stats"></div>

<!-- ===== TABLE ===== -->
<div class="bg-white dark:bg-gray-900 rounded-2xl shadow overflow-hidden">

<div class="p-4 flex justify-between items-center border-b dark:border-gray-800">
  <div class="flex gap-3">
    <button onclick="bulkComplete()"
      class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">
      Bulk Complete
    </button>
  </div>

  <div>
    <input id="search" placeholder="Search..."
      class="px-3 py-2 border rounded-lg text-sm">
  </div>
</div>

<table class="min-w-full text-sm">
<thead class="bg-gray-50 dark:bg-gray-800 text-left">
<tr>
<th class="px-4 py-3">
  <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('title')">Title</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('year')">Year</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('type')">Type</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('created_at')">Created</th>
<th class="px-4 py-3 text-right">Actions</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<div class="flex justify-between items-center p-4 border-t dark:border-gray-800">
<button onclick="prevPage()" class="px-3 py-1 border rounded">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()" class="px-3 py-1 border rounded">Next</button>
</div>

</div>
</div>

<!-- Toast -->
<div id="toast"
class="fixed bottom-5 right-5 bg-green-600 text-white px-4 py-2 rounded shadow-lg opacity-0 transition">
</div>

<script>
let page = 1;
let totalPages = 1;
let limit = 10;
let sort = "created_at";
let order = "DESC";
let selected = [];

async function load() {
  const search = document.getElementById("search").value;

  const res = await fetch(
    `/api/items?page=${page}&limit=${limit}&search=${search}&sort=${sort}&order=${order}`
  );
  const data = await res.json();

  totalPages = Math.ceil(data.total / limit);
  render(data.items);
  updatePagination();
  loadStats();
}

function render(items) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  items.forEach(item => {
    tbody.innerHTML += `
      <tr class="border-t">
        <td class="px-4 py-3">
          <input type="checkbox" value="${item.id}"
            onchange="toggleSelect(${item.id}, this)">
        </td>
        <td class="px-4 py-3">${item.title}</td>
        <td class="px-4 py-3">${item.year || "-"}</td>
        <td class="px-4 py-3">${item.type}</td>
        <td class="px-4 py-3">${new Date(item.created_at).toLocaleString()}</td>
        <td class="px-4 py-3 text-right">
          <button onclick="complete(${item.id})"
            class="text-green-600 text-sm">✔</button>
        </td>
      </tr>
    `;
  });
}

async function complete(id) {
  await fetch(`/api/complete/${id}`, { method: "PATCH" });
  toast("Marked as completed");
  load();
}

async function bulkComplete() {
  if (!selected.length) return;
  await fetch("/api/bulk-complete", {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids: selected })
  });
  selected = [];
  toast("Bulk completed");
  load();
}

function toggleSelect(id, checkbox) {
  if (checkbox.checked) selected.push(id);
  else selected = selected.filter(i => i !== id);
}

function toggleAll(master) {
  document.querySelectorAll("#tbody input[type=checkbox]")
    .forEach(cb => {
      cb.checked = master.checked;
      toggleSelect(parseInt(cb.value), cb);
    });
}

function sortBy(field) {
  sort = field;
  order = order === "ASC" ? "DESC" : "ASC";
  load();
}

function nextPage() {
  if (page < totalPages) page++;
  load();
}

function prevPage() {
  if (page > 1) page--;
  load();
}

function updatePagination() {
  document.getElementById("pageInfo").innerText =
    `Page ${page} of ${totalPages}`;
}

async function loadStats() {
  const res = await fetch("/api/stats");
  const stats = await res.json();

  document.getElementById("stats").innerHTML = `
    <div class="bg-white p-6 rounded shadow">Pending: ${stats.pending}</div>
    <div class="bg-white p-6 rounded shadow">Completed: ${stats.completed}</div>
    <div class="bg-white p-6 rounded shadow">Ignored: ${stats.ignored}</div>
  `;
}

function toast(message) {
  const t = document.getElementById("toast");
  t.innerText = message;
  t.classList.remove("opacity-0");
  setTimeout(() => t.classList.add("opacity-0"), 2000);
}

document.getElementById("search").addEventListener("input", () => {
  page = 1;
  load();
});

load();
</script>
</body>
</html>
