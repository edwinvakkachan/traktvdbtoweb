<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trakt Review Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">

  <!-- Header -->
  <div class="bg-white dark:bg-gray-800 shadow p-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold">🎬 Trakt Review Queue</h1>

    <button onclick="toggleDark()"
      class="px-3 py-1 rounded bg-gray-200 dark:bg-gray-700">
      Toggle Theme
    </button>
  </div>

  <!-- Filters -->
  <div class="p-4 bg-white dark:bg-gray-800 shadow mt-4 mx-4 rounded-xl">
    <div class="flex flex-col md:flex-row gap-4 md:items-center justify-between">

      <input id="search"
        placeholder="Search title..."
        class="w-full md:w-1/3 px-3 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700" />

      <select id="filterType"
        class="px-3 py-2 border rounded-lg bg-gray-50 dark:bg-gray-700">
        <option value="all">All</option>
        <option value="movie">Movies</option>
        <option value="show">Shows</option>
      </select>

    </div>
  </div>

  <!-- Table -->
  <div class="p-4 mx-4">
    <div class="overflow-x-auto bg-white dark:bg-gray-800 rounded-xl shadow">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-200 dark:bg-gray-700 text-left">
          <tr>
            <th class="p-3">Title</th>
            <th class="p-3">Year</th>
            <th class="p-3">Type</th>
            <th class="p-3">Created</th>
            <th class="p-3 text-center">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let items = [];

    async function load() {
      const res = await fetch('/api/pending');
      items = await res.json();
      render();
    }

    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const typeFilter = document.getElementById('filterType').value;

      const filtered = items.filter(item => {
        const matchesSearch = item.title.toLowerCase().includes(search);
        const matchesType = typeFilter === 'all' || item.type === typeFilter;
        return matchesSearch && matchesType;
      });

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';

      filtered.forEach(item => {
        tbody.innerHTML += `
          <tr class="border-t dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 transition">
            <td class="p-3 font-medium">${item.title}</td>
            <td class="p-3">${item.year || '-'}</td>
            <td class="p-3">
              <span class="px-2 py-1 text-xs rounded-full
                ${item.type === 'movie'
                  ? 'bg-blue-100 text-blue-700'
                  : 'bg-green-100 text-green-700'}">
                ${item.type}
              </span>
            </td>
            <td class="p-3 text-xs">${new Date(item.created_at).toLocaleString()}</td>
            <td class="p-3 text-center space-x-2">
              <button onclick="complete(${item.id})"
                class="px-3 py-1 text-xs bg-emerald-500 text-white rounded-lg hover:bg-emerald-600">
                ✔ Complete
              </button>
              <button onclick="ignore(${item.id})"
                class="px-3 py-1 text-xs bg-red-500 text-white rounded-lg hover:bg-red-600">
                ✖ Ignore
              </button>
            </td>
          </tr>
        `;
      });
    }

    async function complete(id) {
      await fetch(`/api/complete/${id}`, { method: 'PATCH' });
      load();
    }

    async function ignore(id) {
      await fetch(`/api/ignore/${id}`, { method: 'PATCH' });
      load();
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filterType').addEventListener('change', render);

    function toggleDark() {
      document.documentElement.classList.toggle('dark');
    }

    load();
  </script>

</body>
</html>
