<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trakt Review Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class'
}
</script>

</head>

<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300">

<div class="max-w-7xl mx-auto p-6">

<!-- Header -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">🎬 Trakt Review Dashboard</h1>
  <button onclick="toggleDark()"
    class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-sm">
    Toggle Theme
  </button>
</div>

<!-- Stats -->
<div id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"></div>

<!-- Table Card -->
<div class="bg-white dark:bg-gray-800 rounded-2xl shadow overflow-hidden">

<!-- Toolbar -->
<div class="p-4 flex justify-between items-center border-b dark:border-gray-700">
  <button onclick="bulkComplete()"
    class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">
    Bulk Complete
  </button>

  <input id="search"
    placeholder="Search..."
    class="px-3 py-2 border rounded-lg text-sm dark:bg-gray-700 dark:border-gray-600">
</div>

<table class="min-w-full text-sm">

<thead class="bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-200 uppercase text-xs">
<tr>
<th class="px-4 py-3">
  <input type="checkbox" id="selectAll" onchange="toggleAll(this)">
</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('title')">Title</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('year')">Year</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('type')">Type</th>
<th class="px-4 py-3 cursor-pointer" onclick="sortBy('created_at')">Created</th>
<th class="px-4 py-3 text-right">Actions</th>
</tr>
</thead>

<tbody id="tbody"
class="divide-y divide-gray-200 dark:divide-gray-700">
</tbody>

</table>

<!-- Pagination -->
<div class="flex justify-between items-center p-4 border-t dark:border-gray-700">
<button onclick="prevPage()" class="px-3 py-1 border rounded">Prev</button>
<span id="pageInfo"></span>
<button onclick="nextPage()" class="px-3 py-1 border rounded">Next</button>
</div>

</div>
</div>

<!-- Toast -->
<div id="toast"
class="fixed bottom-5 right-5 bg-green-600 text-white px-4 py-2 rounded shadow-lg opacity-0 transition duration-300">
</div>

<script>
let page = 1;
let totalPages = 1;
let limit = 10;
let sort = "created_at";
let order = "DESC";
let selected = [];

async function load() {
  const search = document.getElementById("search").value;

  const res = await fetch(`/api/pending`);
const data = await res.json();
totalPages = 1;
render(data);
return;

  const data = await res.json();

  totalPages = Math.ceil(data.total / limit);

  render(data.items);
  updatePagination();
  loadStats();
}

function render(items) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  items.forEach(item => {
    tbody.innerHTML += `
      <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition">
        <td class="px-4 py-3">
          <input type="checkbox" value="${item.id}"
            onchange="toggleSelect(${item.id}, this)">
        </td>
        <td class="px-4 py-3 font-medium">${item.title}</td>
        <td class="px-4 py-3">${item.year || "-"}</td>
        <td class="px-4 py-3 capitalize">${item.type}</td>
        <td class="px-4 py-3 text-xs">${new Date(item.created_at).toLocaleString()}</td>
        <td class="px-4 py-3 text-right">
          <button onclick="complete(${item.id})"
            class="text-green-600 hover:text-green-800 text-sm">
            ✔ Complete
          </button>
        </td>
      </tr>
    `;
  });
}

async function complete(id) {
  await fetch(`/api/complete/${id}`, { method: "PATCH" });
  toast("Marked as completed");
  load();
}

async function bulkComplete() {
  if (!selected.length) return;
  await fetch("/api/bulk-complete", {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids: selected })
  });
  selected = [];
  toast("Bulk completed");
  load();
}

function toggleSelect(id, checkbox) {
  if (checkbox.checked) selected.push(id);
  else selected = selected.filter(i => i !== id);
}

function toggleAll(master) {
  selected = [];
  document.querySelectorAll("#tbody input[type=checkbox]")
    .forEach(cb => {
      cb.checked = master.checked;
      if (master.checked) selected.push(parseInt(cb.value));
    });
}

function sortBy(field) {
  sort = field;
  order = order === "ASC" ? "DESC" : "ASC";
  load();
}

function nextPage() {
  if (page < totalPages) page++;
  load();
}

function prevPage() {
  if (page > 1) page--;
  load();
}

function updatePagination() {
  document.getElementById("pageInfo").innerText =
    `Page ${page} of ${totalPages}`;
}

async function loadStats() {
  const res = await fetch("/api/stats");
  const stats = await res.json();

  document.getElementById("stats").innerHTML = `
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
      <div class="text-sm text-gray-500">Pending</div>
      <div class="text-2xl font-bold">${stats.pending}</div>
    </div>
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
      <div class="text-sm text-gray-500">Completed</div>
      <div class="text-2xl font-bold">${stats.completed}</div>
    </div>
    <div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
      <div class="text-sm text-gray-500">Ignored</div>
      <div class="text-2xl font-bold">${stats.ignored}</div>
    </div>
  `;
}

function toast(message) {
  const t = document.getElementById("toast");
  t.innerText = message;
  t.classList.remove("opacity-0");
  setTimeout(() => t.classList.add("opacity-0"), 2000);
}

function toggleDark() {
  document.documentElement.classList.toggle("dark");
}

document.getElementById("search").addEventListener("input", () => {
  page = 1;
  load();
});

load();
</script>

</body>
</html>
